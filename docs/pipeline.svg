<svg width="1120" height="520" viewBox="0 0 1120 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Adobe Hackathon PDF pipeline">
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="56" y="64" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Adobe Hackathon PDF Intelligence Pipeline</text>
  <text x="56" y="98" font-family="Arial, sans-serif" font-size="16" fill="#475569">Round 1A extracts structured outlines. Round 1B ranks sections for a persona and task.</text>

  <g font-family="Arial, sans-serif">
    <rect x="56" y="150" width="220" height="122" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="84" y="194" font-size="22" font-weight="700" fill="#0f172a">PDF Inputs</text>
    <text x="84" y="224" font-size="15" fill="#475569">Hackathon documents</text>
    <text x="84" y="248" font-size="15" fill="#475569">Persona/task JSON</text>

    <rect x="336" y="110" width="250" height="122" rx="10" fill="#eef2ff" stroke="#6366f1"/>
    <text x="364" y="154" font-size="22" font-weight="700" fill="#0f172a">Round 1A</text>
    <text x="364" y="184" font-size="15" fill="#475569">Title detection</text>
    <text x="364" y="208" font-size="15" fill="#475569">H1/H2/H3 outline JSON</text>

    <rect x="336" y="290" width="250" height="122" rx="10" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="364" y="334" font-size="22" font-weight="700" fill="#0f172a">Round 1B</text>
    <text x="364" y="364" font-size="15" fill="#475569">Section extraction</text>
    <text x="364" y="388" font-size="15" fill="#475569">Persona-aware ranking</text>

    <rect x="646" y="150" width="220" height="122" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="674" y="194" font-size="22" font-weight="700" fill="#0f172a">JSON Outputs</text>
    <text x="674" y="224" font-size="15" fill="#475569">Outline files</text>
    <text x="674" y="248" font-size="15" fill="#475569">Ranked sections</text>

    <rect x="916" y="150" width="150" height="122" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="944" y="194" font-size="22" font-weight="700" fill="#0f172a">Docker</text>
    <text x="944" y="224" font-size="15" fill="#475569">Reproducible</text>
    <text x="944" y="248" font-size="15" fill="#475569">submission flow</text>

    <path d="M276 211H336" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M276 211C308 244 306 308 336 351" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M586 171C618 180 620 202 646 211" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M586 351C620 324 618 246 646 211" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M866 211H916" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
